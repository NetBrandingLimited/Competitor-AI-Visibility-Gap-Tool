name: CI

on:
  push:
    branches: [ main, sprint-1 ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build, type-check, lint, test, and E2E smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/ci.db
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed demo + viewer users (Playwright auth smoke)
        run: npm run db:seed

      - name: Lint, typecheck, and unit tests
        run: npm run check --if-present

      - name: Build (if present)
        run: npm run build --if-present

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end smoke (Playwright)
        run: npx playwright test
        env:
          CI: true
          E2E_AUTH: '1'
